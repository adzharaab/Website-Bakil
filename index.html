<!DOCTYPE html>
<html>
<head>
    <title>Bakil Webpage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Playfair+Display:wght@700&display=swap');

        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f9;
            color: #333;
            line-height: 1.7;
        }

        /* Navigation */
        nav {
            background-color: #2e8b57;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .logo {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            padding: 8px 15px;
            border-radius: 25px;
            transition: 0.3s;
            font-size: 16px;
        }

        .nav-links a:hover {
            background-color: #246b45;
            transform: scale(1.05);
        }

        /* Main Section */
        .container {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
        }

        .text-content {
            max-width: 500px;
            text-align: left;
        }

        .text-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            margin-bottom: 25px;
            color: #2e8b57;
        }

        .text-content p {
            font-size: 18px;
            color: #444;
        }

        .container img {
            width: 320px;
            border-radius: 20px;
            margin: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .container img:hover {
            transform: scale(1.05);
        }

        /* Button */
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #2e8b57;
            color: white;
            text-decoration: none;
            font-weight: 500;
            border-radius: 25px;
            transition: 0.3s;
            font-size: 16px;
        }

        .btn:hover {
            background-color: #246b45;
            transform: scale(1.05);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 15px;
            background-color: #2e8b57;
            color: white;
            margin-top: 40px;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                text-align: center;
            }

            .text-content {
                text-align: center;
            }
        }

        html, body {
            height: 100%;
            overflow-y: auto;
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">🍪Bakil | Webpage</div>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="about.html">About</a>
            <a href="educational.html">Educational</a>
            <a href="journey.html">Journey</a>
        </div>
    </nav>

    <div class="container">
        <div class="text-content">
            <h1>Welcome to My Website</h1>
            <p>
                Hello! This is my personal website where you can learn more about me,
                my education, and my journey. I created this platform to share my
                achievements, experiences, and future goals.
            </p>
          
        </div>

        <img src="Yawa.jpeg" alt="My Picture">
    </div>

    <footer>
        2026 Bakil Webpage | All Rights Reserved
    </footer>

</body>
</html>
